name: Job Radar Check

on:
  schedule:
    # Runs at 13:00 UTC daily (~8am Eastern / 9am during EST).
    # Adjust to taste: https://crontab.guru
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit jobs.db back to the repo

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job radar
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Persist database
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add jobs.db
          git diff --staged --quiet || git commit -m "Update seen jobs database [skip ci]"
          git push
